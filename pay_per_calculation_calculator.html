<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap');

  :root {
    --bg: #0b0c10;
    --panel: #111319;
    --panel-2: #161a22;

    --text: #f5f7fa;
    --muted: #a7b0be;

    --accent: #ffcc66;
    --accent-dark: #e6b84d;

    --border: rgba(255, 255, 255, 0.08);
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: radial-gradient(circle at top, #151826, var(--bg));
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }

  /* ─────────────── CALC WRAPPER ─────────────── */
  #calc-wrap {
    max-width: 380px;
    margin: 2rem auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 22px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  /* ─────────────── HEADER ─────────────── */
  #header {
    background: var(--panel-2);
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #header .logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  #balance-pill {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
  }

  /* ─────────────── DISPLAY ─────────────── */
  #display {
    background: #0f1118;
    padding: 18px;
  }

  #expr {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    min-height: 18px;
  }

  #result {
    font-family: 'Space Mono', monospace;
    font-size: 38px;
    font-weight: 700;
    text-align: right;
    color: var(--text);
    min-height: 50px;
  }

  #cost-notice {
    text-align: right;
    font-size: 11px;
    color: var(--accent);
    margin-top: 4px;
    font-family: 'Space Mono', monospace;
  }

  /* ─────────────── BUTTON GRID ─────────────── */
  #buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
  }

  button.btn {
    height: 66px;
    border: none;
    background: #141824;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    transition: 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  button.btn:hover {
    background: #1a2030;
  }

  button.btn:active {
    transform: scale(0.96);
  }

  /* operators */
  button.btn.op {
    color: var(--accent);
    font-weight: 700;
  }

  /* functions */
  button.btn.fn {
    color: var(--muted);
    font-size: 14px;
  }

  /* equals */
  button.btn.eq {
    background: var(--accent);
    color: #111;
    font-weight: 700;
  }

  button.btn.eq:hover {
    background: var(--accent-dark);
  }

  /* zero */
  button.btn.zero {
    grid-column: span 2;
  }

  /* disabled */
  button.btn.disabled-btn {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* ─────────────── MODAL ─────────────── */
  #modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
  }

  #modal-overlay.show {
    display: flex;
  }

  #modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 280px;
    text-align: center;
  }

  #modal .icon {
    font-size: 36px;
    margin-bottom: 10px;
  }

  #modal h3 {
    font-size: 16px;
    margin-bottom: 6px;
  }

  #modal p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  #modal .price {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  #modal-btns {
    display: flex;
    gap: 10px;
  }

  #modal-btns button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-weight: 600;
    cursor: pointer;
  }

  #btn-pay {
    background: var(--accent);
    color: #111;
  }

  #btn-cancel {
    background: #1a1f2b;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  /* ─────────────── BROKE STATE ─────────────── */
  #broke-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  #broke-overlay.show {
    display: flex;
  }

  #broke-overlay .msg {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 280px;
    text-align: center;
  }

  /* ─────────────── TOAST ─────────────── */
  #toast {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #0f1118;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 999px;
    opacity: 0;
    transition: 0.3s;
  }

  #toast.show {
    opacity: 1;
  }
</style>

<div
  style="position: relative; display: inline-block; width: 100%; display: flex; justify-content: center; padding: 1rem 0 2rem;">
  <div id="calc-wrap" style="position: relative;">
    <div id="header">
      <span class="logo">CALC$$$</span>
      <span id="balance-pill">Balance: $<span id="bal">5.00</span></span>
    </div>

    <div id="display">
      <div id="expr"></div>
      <div id="result">0</div>
      <div id="cost-notice"></div>
    </div>

    <div id="buttons">
      <button class="btn fn" onclick="calcAC()">AC</button>
      <button class="btn fn" onclick="calcPlusMinus()">+/-</button>
      <button class="btn fn" onclick="calcPercent()">%</button>
      <button class="btn op" onclick="pressOp('/')">÷</button>

      <button class="btn" onclick="pressNum('7')">7</button>
      <button class="btn" onclick="pressNum('8')">8</button>
      <button class="btn" onclick="pressNum('9')">9</button>
      <button class="btn op" onclick="pressOp('*')">×</button>

      <button class="btn" onclick="pressNum('4')">4</button>
      <button class="btn" onclick="pressNum('5')">5</button>
      <button class="btn" onclick="pressNum('6')">6</button>
      <button class="btn op" onclick="pressOp('-')">−</button>

      <button class="btn" onclick="pressNum('1')">1</button>
      <button class="btn" onclick="pressNum('2')">2</button>
      <button class="btn" onclick="pressNum('3')">3</button>
      <button class="btn op" onclick="pressOp('+')">+</button>

      <button class="btn zero" onclick="pressNum('0')">0</button>
      <button class="btn" onclick="pressDot()">.</button>
      <button class="btn eq" id="eq-btn" onclick="pressEquals()">=</button>
    </div>

    <div id="modal-overlay">
      <div id="modal">
        <div class="icon">💳</div>
        <h3>Payment required</h3>
        <p id="modal-desc">To receive your answer, please authorize the following charge:</p>
        <div class="price" id="modal-price">$0.25</div>
        <div id="modal-btns">
          <button id="btn-cancel" onclick="cancelPay()">Decline</button>
          <button id="btn-pay" onclick="confirmPay()">Pay now</button>
        </div>
      </div>
    </div>

    <div id="broke-overlay">
      <div class="msg">
        <div style="font-size: 36px; margin-bottom: 8px;">😢</div>
        <h3 style="color: var(--color-text-primary);">Insufficient funds</h3>
        <p>You've run out of credits. Top up to keep calculating!</p>
        <button id="btn-topup" onclick="topUp()">Add $5.00</button>
      </div>
    </div>

    <div id="toast"></div>
  </div>
</div>

<script>
  const PRICES = ['$0.25', '$0.49', '$0.99', '$1.49'];
  const MSGS = [
    "Small fee for big brains.",
    "Math isn't free.",
    "Neurons cost money.",
    "Premium arithmetic™",
    "Knowledge transfer fee.",
    "Anti-free-math tax."
  ];

  let display = '0';
  let operator = null;
  let operand1 = null;
  let fresh = false;
  let exprStr = '';
  let pendingResult = null;
  let balance = 5.00;
  let currentPrice = 0;

  function updateDisplay(val) {
    display = String(val);
    document.getElementById('result').textContent = display;
  }

  function pressNum(n) {
    if (fresh) { display = n; fresh = false; }
    else display = (display === '0') ? n : display + n;
    updateDisplay(display);
  }

  function pressDot() {
    if (fresh) { display = '0.'; fresh = false; }
    else if (!display.includes('.')) display += '.';
    updateDisplay(display);
  }

  function pressOp(op) {
    operand1 = parseFloat(display);
    operator = op;
    exprStr = display + ' ' + { '+': '+', '-': '−', '*': '×', '/': '÷' }[op];
    document.getElementById('expr').textContent = exprStr;
    fresh = true;
    document.getElementById('cost-notice').textContent = '';
  }

  function pressEquals() {
    if (operator === null || operand1 === null) return;

    const operand2 = parseFloat(display);
    let result;

    switch (operator) {
      case '+': result = operand1 + operand2; break;
      case '-': result = operand1 - operand2; break;
      case '*': result = operand1 * operand2; break;
      case '/': result = operand2 === 0 ? 'Error' : operand1 / operand2; break;
    }

    const fullExpr = exprStr + ' ' + display;

    // store result so payment page can use it (optional but useful)
    localStorage.setItem("calcResult", result);
    localStorage.setItem("calcExpression", fullExpr);

    // redirect to payment page
    window.location.href = "payment-page.html";
  }
  function showModal() {
    document.getElementById('modal-overlay').classList.add('show');
  }

  function confirmPay() {
    if (balance < currentPrice) {
      document.getElementById('modal-overlay').classList.remove('show');
      document.getElementById('broke-overlay').classList.add('show');
      return;
    }
    balance = Math.round((balance - currentPrice) * 100) / 100;
    document.getElementById('bal').textContent = balance.toFixed(2);
    document.getElementById('modal-overlay').classList.remove('show');
    let r = pendingResult;
    if (r !== 'Error') {
      r = parseFloat(r.toFixed(10));
      if (Math.abs(r) >= 1e10) r = parseFloat(r.toExponential(4));
    }
    updateDisplay(r);
    document.getElementById('cost-notice').textContent = '−' + PRICES[PRICES.findIndex(p => parseFloat(p.replace('$', '')) === currentPrice) >= 0 ? PRICES.findIndex(p => parseFloat(p.replace('$', '')) === currentPrice) : 0] + ' charged ✓';
    operator = null; operand1 = null; fresh = true;
    showToast('Payment accepted. You\'re welcome.');
  }

  function cancelPay() {
    document.getElementById('modal-overlay').classList.remove('show');
    document.getElementById('result').textContent = '?';
    document.getElementById('cost-notice').textContent = 'Pay up to see the answer.';
    exprStr = '';
    document.getElementById('expr').textContent = '';
    operator = null; operand1 = null; fresh = true;
    display = '0';
  }

  function calcAC() {
    display = '0'; operator = null; operand1 = null; fresh = false; exprStr = '';
    document.getElementById('result').textContent = '0';
    document.getElementById('expr').textContent = '';
    document.getElementById('cost-notice').textContent = '';
    document.getElementById('modal-overlay').classList.remove('show');
  }

  function calcPlusMinus() {
    display = String(parseFloat(display) * -1);
    updateDisplay(display);
  }

  function calcPercent() {
    display = String(parseFloat(display) / 100);
    updateDisplay(display);
  }

  function topUp() {
    balance = Math.round((balance + 5) * 100) / 100;
    document.getElementById('bal').textContent = balance.toFixed(2);
    document.getElementById('broke-overlay').classList.remove('show');
    showToast('$5.00 added. Now pay for your math.');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
